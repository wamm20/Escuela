<div class="dashboard-container">
  <div class="center-card">
    <!-- Pantalla principal (menu) -->
    <img src="assets/logo-escuela-aeronautica.png" alt="Logo Escuela" style="display: block; margin: 0 auto; max-width: 250px;">
  </div>

  <div class="stats-grid">
    <div class="stat-card">
      <div class="icon-box green">👨‍✈️</div>
      <div class="stat-details">
        <h3>Alumnos Activos</h3>
        <div class="number">{{ alumnosCount }}</div>
        <div class="label">En instrucción</div>
      </div>
    </div>

    <div class="stat-card">
      <div class="icon-box blue">✈️</div>
      <div class="stat-details">
        <h3>Cursos Disponibles</h3>
        <div class="number">{{ cursosCount }}</div>
        <div class="label">Piloto Privado & Comercial</div>
      </div>
    </div>

    <div class="stat-card">
      <div class="icon-box orange">📚</div>
      <div class="stat-details">
        <h3>Materias Disponibles</h3>
        <div class="number">{{ materiasCount }}</div>
        <div class="label">Teóricas y Prácticas</div>
      </div>
    </div>

    <div class="stat-card">
      <div class="icon-box purple">👨‍🏫</div>
      <div class="stat-details">
        <h3>Profesores Activos</h3>
        <div class="number">{{ profesoresCount }}</div>
        <div class="label">Instructores de vuelo</div>
      </div>
    </div>
  </div>
</div>
